name: Verify
on:
  workflow_call:
  workflow_dispatch:

permissions: {}

env:
  NODE_ENV: production
  NODE_OPTIONS: '--disable-warning=ExperimentalWarning --disable-warning=DeprecationWarning'

jobs:
  checks:
    name: Checks
    runs-on: ${{ vars.DEPOT_ENABLED == 'true' && 'depot-ubuntu-latest' || 'ubuntu-latest' }}

    steps:
      - name: Clone repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          submodules: 'recursive'
          persist-credentials: false

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Check code and types
        run: pnpm gen:types && pnpm check

      - name: Rebuild trusted lint dependency
        run: pnpm rebuild @ast-grep/cli

      - name: Run Tempo Lints
        run: pnpm lint:tempo
