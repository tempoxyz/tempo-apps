name: Test Contract Verification

on:
  workflow_dispatch:
    inputs:
      rpc-url:
        description: 'RPC URL'
        required: false
        default: 'https://rpc.testnet.tempo.xyz'
      verifier-url:
        description: 'Verifier URL'
        required: false
        default: 'https://contracts.tempo.xyz'
  schedule:
    - cron: '0 */6 * * *'

defaults:
  run:
    shell: bash
    working-directory: apps/contract-verification

env:
  ACTIONS_RUNNER_DEBUG: true
  TEMPO_RPC_URL: ${{ github.event.inputs.rpc-url || 'https://rpc.testnet.tempo.xyz' }}
  VERIFIER_URL: ${{ github.event.inputs.verifier-url || 'https://contracts.tempo.xyz' }}

jobs:
  verify-vyper:
    env:
      GH_TOKEN: ${{ github.token }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@master
        with:
          version: nightly
          network: tempo

      - name: Install uv
        uses: astral-sh/setup-uv@main
        with:
          version: latest
          python-version: '3.14'

      - name: Install vyper Compiler
        run: uv tool install vyper

      - name: Test Vyper (small counter)
        run: ./scripts/test-vyper.sh

      - name: Notify Slack on Failure
        if: failure()
        uses: ./.github/actions/slack-notify-failure
        with:
          webhook-key: ${{ secrets.SLACK_WEBHOOK_KEY }}
          workflow: ${{ github.workflow }}
          repository: ${{ github.repository }}
          ref-name: ${{ github.ref_name }}
          actor: ${{ github.actor }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  verify-solidity:
    env:
      GH_TOKEN: ${{ github.token }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@master
        with:
          version: nightly
          network: tempo

      - name: Test Solidity
        run: ./scripts/test-big-boy.sh

      - name: Notify Slack on Failure
        if: failure()
        uses: ./.github/actions/slack-notify-failure
        with:
          webhook-key: ${{ secrets.SLACK_WEBHOOK_KEY }}
          workflow: ${{ github.workflow }}
          repository: ${{ github.repository }}
          ref-name: ${{ github.ref_name }}
          actor: ${{ github.actor }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
