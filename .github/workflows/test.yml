name: Test fee-payer
on:
  pull_request:
    paths:
      - "pnpm-lock.yaml"
      - "apps/fee-payer/**"
      - "apps/contract-verification/**"
  push:
    branches: [main]
    paths:
      - "pnpm-lock.yaml"
      - "apps/fee-payer/**"
      - "apps/contract-verification/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  NODE_OPTIONS: "--disable-warning=ExperimentalWarning --disable-warning=DeprecationWarning"

jobs:
  test:
    name: Test
    runs-on: ${{ vars.DEPOT_ENABLED == 'true' && 'depot-ubuntu-latest' || 'ubuntu-latest' }}

    steps:
      - name: Clone repository
        uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Run tests (fee-payer)
        run: pnpm test
        env:
          TEMPO_ENV: localnet
        working-directory: apps/fee-payer

      - name: Run tests (contract-verification)
        run: pnpm test
        working-directory: apps/contract-verification
