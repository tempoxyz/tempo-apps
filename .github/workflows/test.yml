name: Test
on:
  pull_request:
    paths:
      - "pnpm-lock.yaml"
      - "apps/fee-payer/**"
      - "apps/contract-verification/**"
  push:
    branches: [main]
    paths:
      - "pnpm-lock.yaml"
      - "apps/fee-payer/**"
      - "apps/contract-verification/**"
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  NODE_OPTIONS: '--disable-warning=ExperimentalWarning --disable-warning=DeprecationWarning'

jobs:
  test-fee-payer:
    name: Test Fee Payer
    runs-on: ${{ vars.DEPOT_ENABLED == 'true' && 'depot-ubuntu-latest' || 'ubuntu-latest' }}

    steps:
      - name: Clone repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: "recursive"
          persist-credentials: false

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Generate Worker types
        run: pnpm gen:types
        working-directory: apps/fee-payer

      - name: Run tests
        run: pnpm test
        env:
          TEMPO_ENV: testnet
          TEMPO_RPC_URL: https://rpc.testnet.tempo.xyz
          SPONSOR_PRIVATE_KEY: ${{ secrets.SPONSOR_PRIVATE_KEY }}
        working-directory: apps/fee-payer

  test-contracts:
    name: Test Contract Verification
    runs-on: ${{ vars.DEPOT_ENABLED == 'true' && 'depot-ubuntu-latest' || 'ubuntu-latest' }}

    steps:
      - name: Clone repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: "recursive"
          persist-credentials: false

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Generate Worker types
        run: pnpm gen:types
        working-directory: apps/contract-verification

      - name: Run tests
        run: pnpm test
        working-directory: apps/contract-verification
