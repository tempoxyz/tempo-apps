name: Main
on:
  workflow_dispatch:
  push:
    branches: [main]

permissions: {}

env:
  NODE_ENV: production
  WRANGLER_SEND_METRICS: false

jobs:
  verify:
    name: Verify
    uses: ./.github/workflows/verify.yml

  deploy-explorer:
    name: Deploy Explorer
    needs: verify
    uses: ./.github/workflows/deploy.yml
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    with:
      app: explorer
      environments: '["testnet","mainnet","devnet"]'

  deploy-fee-payer:
    name: Deploy Fee Payer
    needs: verify
    uses: ./.github/workflows/deploy.yml
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    with:
      app: fee-payer
      environments: '["privy","devnet","moderato","mainnet"]'

  deploy-contract-verification:
    name: Deploy Contract Verification
    needs: verify
    uses: ./.github/workflows/deploy.yml
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    with:
      app: contract-verification
      environments: '[""]'

  deploy-key-manager:
    name: Deploy Key Manager
    needs: verify
    uses: ./.github/workflows/deploy.yml
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    with:
      app: key-manager
      environments: '[""]'

  deploy-og:
    name: Deploy OG
    needs: verify
    uses: ./.github/workflows/deploy.yml
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    with:
      app: og
      environments: '[""]'

  deploy-tokenlist:
    name: Deploy Tokenlist
    needs: verify
    uses: ./.github/workflows/deploy.yml
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    with:
      app: tokenlist
      environments: '[""]'
