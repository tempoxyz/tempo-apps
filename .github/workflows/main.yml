name: Main
on:
  workflow_dispatch:
  push:
    branches: [main]

permissions: {}

env:
  NODE_ENV: production
  WRANGLER_SEND_METRICS: false

jobs:
  verify:
    name: Verify
    uses: ./.github/workflows/verify.yml

  deploy-explorer:
    name: Deploy Explorer
    needs: verify
    uses: ./.github/workflows/deploy.yml
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    with:
      app: explorer
      environments: '["testnet","mainnet","devnet"]'

  deploy-fee-payer:
    name: Deploy Fee Payer
    needs: verify
    uses: ./.github/workflows/deploy.yml
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    with:
      app: fee-payer
      environments: '["privy","devnet","moderato","mainnet"]'

  deploy-contract-verification:
    name: Deploy Contract Verification
    needs: verify
    uses: ./.github/workflows/deploy.yml
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    with:
      app: contract-verification
      environments: '[""]'

  deploy-key-manager:
    name: Deploy Key Manager
    needs: verify
    uses: ./.github/workflows/deploy.yml
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    with:
      app: key-manager
      environments: '[""]'

  deploy-perf:
    name: Deploy Perf
    needs: verify
    uses: ./.github/workflows/deploy.yml
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    with:
      app: perf
      environments: '[""]'

  deploy-perf-internal:
    name: Deploy Perf Internal
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: "recursive"
          fetch-depth: 0
          persist-credentials: false

      - name: Check for relevant changes
        id: changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          if [[ "$EVENT_NAME" == 'workflow_dispatch' ]]; then
            echo "relevant=true" >> $GITHUB_OUTPUT
          elif git diff --name-only "$BEFORE_SHA" "$CURRENT_SHA" | grep -qE "^(apps/perf/|pnpm-lock.yaml|packages/)"; then
            echo "relevant=true" >> $GITHUB_OUTPUT
          else
            echo "relevant=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        if: steps.changes.outputs.relevant == 'true'
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435

      - name: Log in to GHCR
        if: steps.changes.outputs.relevant == 'true'
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push image
        if: steps.changes.outputs.relevant == 'true'
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
        with:
          context: .
          file: apps/perf/Dockerfile
          push: true
          tags: |
            ghcr.io/tempoxyz/tempo-apps-internal-perf:latest
            ghcr.io/tempoxyz/tempo-apps-internal-perf:${{ github.sha }}

  deploy-og:
    name: Deploy OG
    needs: verify
    uses: ./.github/workflows/deploy.yml
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    with:
      app: og
      environments: '[""]'

  deploy-tokenlist:
    name: Deploy Tokenlist
    needs: verify
    uses: ./.github/workflows/deploy.yml
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    with:
      app: tokenlist
      environments: '[""]'

  deploy-reth-snapshots-viewer:
    name: Deploy Reth Snapshots Viewer
    needs: verify
    uses: ./.github/workflows/deploy.yml
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    with:
      app: reth-snapshots-viewer
      environments: '[""]'

  deploy-tempo-snapshots-viewer:
    name: Deploy Tempo Snapshots Viewer
    needs: verify
    uses: ./.github/workflows/deploy.yml
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    with:
      app: tempo-snapshots-viewer
      environments: '[""]'
